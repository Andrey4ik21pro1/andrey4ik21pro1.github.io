name: Build & Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install rollup @rollup/plugin-node-resolve @material/web minify

      - name: Build JS Bundle with Rollup
        run: |
          npx rollup -p @rollup/plugin-node-resolve script.js -o bundle.js
          mv bundle.js script.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          destination: "./build"

      - name: Minify files
        run: |
          cp -r build build_rw

          mapfile -t files < <(find build_rw -type f \( -name "*.html" -o -name "*.css" \))

          for file in "${files[@]}"; do
            tmp=$(mktemp)
            npx minify "$file" --fail-on-error > "$tmp" && mv "$tmp" "$file"
            echo "Minified: $file"
          done

          mv build_rw _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4